<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Django</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #333; color: white; padding: 1rem; text-align: center; }
        nav { background-color: #444; padding: 0.5rem; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; }
        main { padding: 2rem; min-height: 400px; }
        footer { background-color: #333; color: white; text-align: center; padding: 1rem; margin-top: auto; }
    </style>
</head>
<body>

    <header>
        <h1>Proyecto Web Django</h1>
    </header>
    <nav>
        <a href="/">Inicio</a>
        <a href="/contacto/">Contacto</a>
    </nav>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <footer>
        <p>&copy; 2026 Joao - Desarrollado con Django</p>
    </footer>

</body>
</html>
