{% extends 'principal/base.html' %}

{% block content %}
    <h2>Contáctanos (Versión profesional con Django forms)</h2>
    <p>Por favor, llena el siguiente formulario para enviarnos un mensaje.</p>

    {% if mensaje_exito %}
        <div style="background-color: #d4edda; color: #155724; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
            {{ mensaje_exito }}
        </div>
    {% endif %}

    <form method="POST" action="">
        {% csrf_token %}
        
        {{ form.as_p }}
        
        <button type="submit" style="padding: 10px 20px; background-color: #333; color: white; border: none; cursor: pointer; margin-top: 10px;">
            Enviar Mensaje
        </button>
    </form>
{% endblock content %}
