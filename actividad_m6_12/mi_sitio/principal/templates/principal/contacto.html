{% extends 'principal/base.html' %}

{% block content %}
    <h2>Contáctanos</h2>
    <p>Por favor, llena el siguiente formulario para enviarnos un mensaje.</p>

    {% if mensaje %}
        <div style="background-color: #d4edda; color: #155724; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
            {{ mensaje }}
        </div>
    {% endif %}
    
    {% if error %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="">
        {% csrf_token %} <div style="margin-bottom: 15px;">
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" style="width: 100%; padding: 5px;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label for="email">Correo electrónico:</label><br>
            <input type="email" id="email" name="email" style="width: 100%; padding: 5px;">
        </div>
        
        <button type="submit" style="padding: 10px 20px; background-color: #333; color: white; border: none; cursor: pointer;">
            Enviar Mensaje
        </button>
    </form>
{% endblock content %}
