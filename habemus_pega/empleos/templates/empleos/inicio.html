{% extends 'empleos/base.html' %}
{% load static %}

{% block title %}Inicio | Habemus Pega{% endblock %}

{% block content %}
<style>
    .hero-bg-custom {
        background-image: url("{% static 'empleos/images/hero_bg.png' %}");
    }
</style>

<div class="hero-section hero-bg-custom">
    <div class="hero-content">
        <h1 class="hero-title-hp">Tu próxima gran oportunidad laboral empieza aquí</h1>
        <p class="hero-subtitle-hp">Conectamos el mejor talento con las empresas líderes del país.</p>
        
        <div class="search-box-pilled">
            <form action="#" method="GET" class="search-form-flex">
                
                <div class="input-group-hp" style="flex: 1.5;">
                    <svg class="hp-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                    </svg>
                    <input type="text" name="q" placeholder="Puesto, empresa o categoría" class="hp-input" required>
                </div>

                <div class="search-divider-hp"></div>

                <div class="input-group-hp">
                    <svg class="hp-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                    <input type="text" name="lugar" placeholder="Lugar (Ciudad o Región)" class="hp-input">
                </div>

                <button type="submit" class="btn-habemus-search">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Buscar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
