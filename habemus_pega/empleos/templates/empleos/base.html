{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habemus Pega{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'empleos/css/style.css' %}?v=2.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar-habemus">
        <div class="nav-container">
            <a href="{% url 'inicio' %}" class="habemus-logo">
                <span class="habemus">Habemus</span><span class="pega">Pega</span>
            </a>

            <div class="nav-links">
                {% if user.is_authenticated %}
                    <span class="nav-item" style="font-weight: 400; color: #666;">Hola, <strong>{{ user.username }}</strong></span>
                    <a href="{% url 'contacto' %}" class="nav-item btn-nav-outline">Publicar Aviso</a>
                    <form method="post" action="{% url 'logout' %}" style="display:inline; margin:0;">
                        {% csrf_token %}
                        <button type="submit" class="nav-item btn-nav-red" style="border:none; cursor:pointer;">Salir</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-item">Iniciar sesión</a>
                    <a href="#" class="nav-item btn-nav-outline">Unirse ahora</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="main-wrapper">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
