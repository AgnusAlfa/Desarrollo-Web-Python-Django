{% extends 'empleos/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 style="color: var(--grafito); font-weight: bold;">Acceso Empresas</h2>
                    <p class="text-muted">Inicia sesión para publicar en Habemus Pega</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>
                    <button type="submit" class="btn btn-rojo w-100 py-2 mt-3">Ingresar al Panel</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
